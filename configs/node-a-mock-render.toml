[node]
name = "node-a-mock-render"
listen_addr = "0.0.0.0:38001"
peer_addr = "127.0.0.1:38002"
transport_backend = "mock"

[audio]
backend = "mock"
input_device = "Mock Microphone"
sample_rate = 48000
channels = 1
frame_ms = 10

[output]
backend = "virtual_stub"
target_device = "default"
monitor_processed_output = true
wav_path = "artifacts/windows-render/processed-output.wav"

[sync]
jitter_buffer_frames = 3
coarse_search_ms = 30
drift_compensation = true

[cancel]
filter_length = 1536
step_size = 0.06
leakage = 0.0001
update_threshold = 0.48
anti_phase_enabled = true
anti_phase_max_gain = 1.45
anti_phase_smoothing = 0.72

[vad]
enabled = true
local_threshold = 0.6
peer_threshold = 0.6
smoothing = 0.85

[residual]
enabled = true
strength = 0.72

[debug]
dump_wav = true
dump_metrics = true
dump_dir = "artifacts/windows-render"
log_level = "info"
mock_peer_delay_ms = 20
mock_peer_gain = 0.35

[gui]
auto_start = false
refresh_hz = 30
